<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>長照 2.0 輔具選配</title>
<style>
:root{--pri:#3498db;--ok:#27ae60;--warn:#f39c12;--err:#e74c3c;--bg:#1a1a2e;--card:#16213e;--txt:#eee;--mut:#aaa;--brd:#2a3a5c}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"Noto Sans TC",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding:12px}
.c{max-width:500px;margin:0 auto}
.hdr{background:var(--card);border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid var(--brd)}
.hdr h1{font-size:17px;margin-bottom:10px;color:var(--pri)}
.ir{display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px}
.ir .l{color:var(--mut)}.ir .v{font-weight:bold}
.bb{background:var(--card);border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid var(--brd);position:sticky;top:6px;z-index:10}
.bb .t{font-size:13px;color:var(--mut);margin-bottom:6px}
.bt{height:22px;background:#2a3a5c;border-radius:11px;overflow:hidden;position:relative}
.bf{height:100%;background:var(--ok);border-radius:11px;transition:width .3s,background .3s}
.bf.w{background:var(--warn)}.bf.o{background:var(--err)}
.bx{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:12px;font-weight:bold;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.bs{display:flex;justify-content:space-between;font-size:12px;margin-top:6px}
.sec{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid var(--brd)}
.sec h2{font-size:14px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--brd)}
.di{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);gap:8px}
.di:last-child{border-bottom:none}
.di .nm{flex:1;min-width:0}
.di .nm .n{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.di .nm .cd{font-size:11px;color:var(--mut)}
.di .tp{font-size:10px;padding:2px 6px;border-radius:4px;white-space:nowrap}
.tp.buy{background:#1a472a;color:#6fcf97}.tp.rent{background:#3b2e12;color:#f2c94c}.tp.both{background:#1a3a4a;color:#56ccf2}
.di .pr{font-size:13px;font-weight:bold;color:var(--ok);white-space:nowrap;min-width:55px;text-align:right}
.qty{display:flex;align-items:center;gap:0;min-width:80px}
.qty button{width:28px;height:28px;border:1px solid var(--brd);background:var(--bg);color:var(--txt);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty button:first-child{border-radius:6px 0 0 6px}
.qty button:last-child{border-radius:0 6px 6px 0}
.qty button:active{background:var(--pri)}
.qty .qv{width:24px;height:28px;border-top:1px solid var(--brd);border-bottom:1px solid var(--brd);background:var(--card);text-align:center;line-height:28px;font-size:13px;font-weight:bold}
.qv.active{color:var(--pri)}
.ds{background:var(--card);border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid var(--brd)}
.ds label{display:block;font-size:13px;margin-bottom:6px;color:var(--mut)}
.ds textarea{width:100%;height:70px;background:var(--bg);border:1px solid var(--brd);border-radius:8px;color:var(--txt);padding:8px;font-size:13px;font-family:inherit;resize:vertical}
.ds textarea::placeholder{color:#555}
.sb{display:block;width:100%;padding:14px;background:var(--pri);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:bold;cursor:pointer;margin-bottom:12px;transition:opacity .2s}
.sb:disabled{opacity:.35;cursor:not-allowed}.sb:not(:disabled):active{opacity:.8}
.rp{display:none;background:var(--card);border-radius:12px;padding:18px;margin-bottom:14px;border:2px solid var(--ok);text-align:center}
.rp.show{display:block}
.dl{display:block;padding:13px;background:#5865F2;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:bold;text-decoration:none;margin-top:10px;cursor:pointer}
.dl:active{opacity:.8}
.ld{display:none;text-align:center;padding:20px}.ld.show{display:block}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--brd);border-top-color:var(--pri);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ft{text-align:center;font-size:10px;color:var(--mut);padding:14px 0}
</style>
</head>
<body>
<div class="c">
<div class="hdr">
  <h1>🔍 長照 2.0 輔具選配</h1>
  <div class="ir"><span class="l">CMS 等級</span><span class="v" id="i-cms">—</span></div>
  <div class="ir"><span class="l">收入別</span><span class="v" id="i-inc">—</span></div>
  <div class="ir"><span class="l">自付比例</span><span class="v" id="i-cop">—</span></div>
  <div class="ir"><span class="l">B3 三年額度</span><span class="v" id="i-b3">—</span></div>
</div>
<div class="bb">
  <div class="t">💰 B3 預算使用</div>
  <div class="bt"><div class="bf" id="bf"></div><span class="bx" id="bx">$0 / $40,000</span></div>
  <div class="bs">
    <span>已選 <b id="cs">0</b> 項</span>
    <span>自付 <b id="ca">$0</b></span>
    <span id="rt">剩餘 <b>$40,000</b></span>
  </div>
</div>
<div id="sections"></div>
<div class="ds">
  <label>📝 個案狀況描述（選填，可提升查詢精準度）</label>
  <textarea id="desc" placeholder="例如：中風右偏癱，獨居，浴室容易滑倒，需要輪椅外出..."></textarea>
</div>
<button class="sb" id="sbtn" disabled>🔍 查詢結果 → 回到 Discord</button>
<div class="ld" id="loading"><div class="spinner"></div><div style="margin-top:8px;font-size:13px">正在送出查詢...</div></div>
<div class="rp" id="rp">
  <div style="font-size:22px;margin-bottom:6px">✅</div>
  <div style="font-size:14px">查詢已送出，請回到 Discord 查看結果</div>
  <a class="dl" id="dlink">💬 回到 Discord 查看結果</a>
</div>
<div class="ft">📌 資料來源：衛福部 1966.gov.tw ｜ 購買組數=補助購買個數，租賃組數=補助租賃月份數<br>輔具查詢僅供參考，實際項目請依治療師評估為準</div>
</div>

<script>

{c:"EB03",n:"助行器",p:800,t:"buy"},{c:"EB04",n:"帶輪型助步車(助行椅)",p:3000,t:"both",rp:300}]},

{c:"EC09",n:"擺位系統-C款(軀幹側支撐架)",p:3000,t:"buy"},{c:"EC10",n:"擺位系統-D款(頭靠系統)",p:2500,t:"buy"},

{id:"EE",name:"📢 溝通及訊號輔具",nb:"bathroom",items:[
{c:"EE01",n:"電話擴音器",p:2000,t:"buy"},{c:"EE02",n:"電話閃光震動器",p:2000,t:"buy"},
{c:"EE03",n:"火警閃光警示器",p:2000,t:"buy"},{c:"EE04",n:"門鈴閃光器",p:2000,t:"buy"},{c:"EE05",n:"無線震動警示器",p:2000,t:"buy"}]},
{id:"EF",name:"🏠 生活輔具",nb:"mobility",items:[
{c:"EF01",n:"衣著用輔具",p:500,t:"buy"},{c:"EF02",n:"居家用生活輔具",p:500,t:"buy"},{c:"EF03",n:"飲食用輔具",p:500,t:"buy"}]},
{id:"EG",name:"🛏️ 壓瘡預防輔具",nb:"transfer",items:[
{c:"EG01",n:"氣墊床-A款",p:8000,t:"both",rp:300},{c:"EG02",n:"氣墊床-B款",p:12000,t:"both",rp:500},
{c:"EG03",n:"輪椅座墊-A款(塑膠氣囊)",p:5000,t:"buy"},{c:"EG04",n:"輪椅座墊-B款(橡膠氣囊)",p:10000,t:"buy"},
{c:"EG05",n:"輪椅座墊-C款(液態凝膠)",p:10000,t:"buy"},{c:"EG06",n:"輪椅座墊-D款(固態凝膠)",p:8000,t:"buy"},
{c:"EG07",n:"輪椅座墊-E款(填充氣囊)",p:8000,t:"buy"},{c:"EG08",n:"輪椅座墊-F款(交替充氣)",p:5000,t:"buy"},
{c:"EG09",n:"輪椅座墊-G款(量製型)",p:10000,t:"buy"}]},
{id:"EH",name:"🛌 居家照顧床及爬梯機",nb:"transfer",items:[
{c:"EH01",n:"居家用照顧床",p:8000,t:"both",rp:1000},{c:"EH02",n:"照顧床附加-A款(床面升降)",p:5000,t:"both",rp:200},
{c:"EH03",n:"照顧床附加-B款(電動升降)",p:5000,t:"both",rp:500},
{c:"EH04",n:"爬梯機(單趟)",p:700,t:"rent",rp:700},{c:"EH05",n:"爬梯機(月)",p:4000,t:"rent",rp:4000}]},
{id:"FA",name:"🏗️ 居家無障礙設施",nb:"bathroom",items:[
{c:"FA01",n:"扶手",p:150,t:"buy"},{c:"FA02",n:"可動式扶手",p:3600,t:"buy"},
{c:"FA03",n:"非固定式斜坡板A款",p:3500,t:"buy"},{c:"FA04",n:"非固定式斜坡板B款",p:5000,t:"buy"},
{c:"FA05",n:"非固定式斜坡板C款",p:10000,t:"buy"},{c:"FA06",n:"固定式斜坡道",p:10000,t:"buy"},
{c:"FA07",n:"架高式和式地板拆除",p:5000,t:"buy"},{c:"FA08",n:"反光貼條或消光",p:3000,t:"buy"},
{c:"FA09",n:"隔間",p:600,t:"buy"},{c:"FA10",n:"防滑措施",p:3000,t:"buy"},
{c:"FA11",n:"門A款",p:7000,t:"buy"},{c:"FA12",n:"門B款",p:10000,t:"buy"},
{c:"FA13",n:"水龍頭",p:3000,t:"buy"},{c:"FA14",n:"改善浴缸",p:7000,t:"buy"},
{c:"FA15",n:"改善洗臉台",p:3000,t:"buy"},{c:"FA16",n:"改善馬桶",p:5000,t:"buy"},
{c:"FA17",n:"壁掛式淋浴椅(床)",p:5000,t:"buy"},{c:"FA18",n:"改善流理台",p:15000,t:"buy"},
{c:"FA19",n:"改善抽油煙機",p:1000,t:"buy"},{c:"FA20",n:"特殊簡易洗槽",p:2000,t:"buy"},
{c:"FA21",n:"特殊簡易浴槽",p:5000,t:"buy"}]},
{id:"FA2",name:"🔨 居家無障礙修繕/設備(新制)",nb:"bathroom",items:[
{c:"FA22",n:"固定式扶手(每10cm)",p:160,t:"buy"},{c:"FA23",n:"可動式扶手(單支)",p:3600,t:"buy"},
{c:"FA24",n:"床邊扶手(單處)",p:1000,t:"buy"},{c:"FA25",n:"門檻斜角(單側)",p:1000,t:"buy"},
{c:"FA26",n:"非固定式斜坡板A款",p:3500,t:"buy"},{c:"FA27",n:"非固定式斜坡板B款",p:5000,t:"buy"},
{c:"FA28",n:"非固定式斜坡板C款",p:7000,t:"buy"},{c:"FA29",n:"非固定式斜坡板D款",p:10000,t:"buy"},
{c:"FA30",n:"改善高低差(10cm以下)",p:3500,t:"buy"},{c:"FA31",n:"改善高低差(20cm以下)",p:5000,t:"buy"},
{c:"FA32",n:"改善高低差(30cm以下)",p:7000,t:"buy"},{c:"FA33",n:"改善高低差(超過30cm)",p:10000,t:"buy"},
{c:"FA34",n:"防滑地磚(單處)",p:6000,t:"buy"},{c:"FA35",n:"防滑措施",p:2000,t:"buy"},
{c:"FA36",n:"隔間(每m²)",p:800,t:"buy"},{c:"FA37",n:"門簡易型(單處)",p:7000,t:"buy"},
{c:"FA38",n:"門進階型(單處)",p:10000,t:"buy"},{c:"FA39",n:"截水槽(單處)",p:6000,t:"buy"},
{c:"FA40",n:"改善浴缸(單處)",p:7000,t:"buy"},{c:"FA41",n:"改善馬桶(單處)",p:5000,t:"buy"},
{c:"FA42",n:"馬桶背靠(單處)",p:2000,t:"buy"},{c:"FA43",n:"移動式清洗槽-局部型",p:2000,t:"buy"},
{c:"FA44",n:"移動式清洗槽-全身型",p:5000,t:"buy"}]}
];

const state={};// code -> qty
let P={};

function parseParams(){
  const u=new URLSearchParams(location.search);
  P={cms:+(u.get("cms"))||5,income:u.get("income")||"general",b3:+(u.get("b3"))||40000,
     copay:+(u.get("copay"))||.3,guild:u.get("guild")||"",channel:u.get("channel")||"",
     webhook:u.get("wh")||"",result_channel:u.get("result_channel")||""};
  const im={low:"低收入戶",mid_low:"中低收入戶",general:"一般戶"};
  document.getElementById("i-cms").textContent="第 "+P.cms+" 級";
  document.getElementById("i-inc").textContent=im[P.income]||P.income;
  document.getElementById("i-cop").textContent=(P.copay*100).toFixed(0)+"%";
  document.getElementById("i-b3").textContent="$"+P.b3.toLocaleString();
}

function render(){
  const root=document.getElementById("sections");
  CATS.forEach(cat=>{
    const sec=document.createElement("div");sec.className="sec";
    const h2=document.createElement("h2");h2.textContent=cat.name+" ("+cat.items.length+")";
    const items=document.createElement("div");items.className="items";
    // 全部展開，不折疊
    sec.appendChild(h2);
    cat.items.forEach(it=>{
      const d=document.createElement("div");d.className="di";
      const tl={buy:"購置",rent:"租賃",both:"購/租"};
      const tc={buy:"buy",rent:"rent",both:"both"};
      d.innerHTML=`
        <div class="nm"><div class="n">${it.n}</div><div class="cd">${it.c} <span class="tp ${tc[it.t]}">${tl[it.t]}</span></div></div>
        <div class="pr">$${it.p.toLocaleString()}</div>
        <div class="qty">
          <button data-code="${it.c}" data-d="-1">−</button>
          <div class="qv" id="q-${it.c}">0</div>
          <button data-code="${it.c}" data-d="1">+</button>
        </div>`;
      d.querySelectorAll("button").forEach(b=>b.addEventListener("click",e=>{
        e.stopPropagation();
        const code=b.dataset.code,dir=+b.dataset.d;
        const cur=state[code]||0;
        const nv=Math.max(0,Math.min(99,cur+dir));
        if(nv===0)delete state[code];else state[code]=nv;
        const qv=document.getElementById("q-"+code);
        qv.textContent=nv;qv.classList.toggle("active",nv>0);
        d.style.background=nv>0?"rgba(52,152,219,.06)":"";
        updateBudget();
      }));
      items.appendChild(d);
    });
    sec.appendChild(items);root.appendChild(sec);
  });
}

function getAllItems(){const m={};CATS.forEach(c=>c.items.forEach(i=>m[i.c]=i));return m}
const allItems=getAllItems?null:null;// lazy
function getItem(code){for(const c of CATS)for(const i of c.items)if(i.c===code)return i;return null}

function updateBudget(){
  let total=0,count=0;
  for(const[code,qty]of Object.entries(state)){
    const it=getItem(code);if(it)total+=it.p*qty;count+=qty;
  }
  const lim=P.b3,pct=Math.min(total/lim*100,100),rem=lim-total,cop=Math.round(total*P.copay);
  const bf=document.getElementById("bf");
  bf.style.width=pct+"%";bf.className="bf"+(pct>90?" o":pct>70?" w":"");
  document.getElementById("bx").textContent="$"+total.toLocaleString()+" / $"+lim.toLocaleString();
  document.getElementById("cs").textContent=count;
  document.getElementById("ca").textContent="$"+cop.toLocaleString();
  document.getElementById("rt").innerHTML=rem>=0
    ?"剩餘 <b>$"+rem.toLocaleString()+"</b>"
    :"<b style='color:var(--err)'>超額 $"+(-rem).toLocaleString()+"</b>";
  document.getElementById("sbtn").disabled=count===0;
}

function buildPayload(){
  const codes=Object.entries(state).filter(([,q])=>q>0).map(([c,q])=>c+":"+q);
  const incMap={low:"L",mid_low:"M",general:"G"};
  const desc=document.getElementById("desc").value.trim();
  // 推薦碼（用 ~ 分隔描述，避免與 EA01-1 的 - 衝突）
  const rc="R-"+P.cms+(incMap[P.income]||"G")+"-"+codes.join(".")+
    (desc?"~"+encodeURIComponent(desc.substring(0,80)):"");
  // 人類可讀摘要
  let summary="**輔具查詢** — CMS "+P.cms+" 級\n";
  for(const[code,qty] of Object.entries(state)){
    if(qty<=0)continue;
    const it=getItem(code);
    summary+="`"+code+"` "+it.n+" ×"+qty+" ($"+(it.p*qty).toLocaleString()+")\n";
  }
  if(desc)summary+="\n📝 "+desc;
  return{code:rc,summary:summary};
}

document.getElementById("sbtn").addEventListener("click",async function(){
  this.style.display="none";
  document.getElementById("loading").classList.add("show");
  const{code,summary}=buildPayload();
  const whUrl=P.webhook;
  let ok=false;
  if(whUrl){
    try{
      const resp=await fetch(whUrl,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({content:code+"\n"+summary,username:"輔具選配",avatar_url:""})});
      ok=resp.ok;
    }catch(e){console.error(e)}
  }
  document.getElementById("loading").classList.remove("show");
  const rp=document.getElementById("rp");rp.classList.add("show");
  if(!ok)rp.querySelector("div:nth-child(2)").textContent="⚠️ 自動送出失敗，請複製推薦碼貼回 Discord";
  if(P.guild){
    const jumpCh=P.result_channel||P.channel;
    if(jumpCh) document.getElementById("dlink").href="discord:///channels/"+P.guild+"/"+jumpCh;
  }
  rp.scrollIntoView({behavior:"smooth"});
});

parseParams();render();updateBudget();
</script>
</body>
</html>
